<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Sheets-Backed Site</title>

<style>
:root{
--bg:#0f1220;
--panel:#161a2f;
--text:#e7e9ff;
--muted:#aab0ff;
--accent:#7c7cff;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;

background:
linear-gradient(rgba(11,14,26,0.85), rgba(15,18,32,0.9)),
url("background.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;

color:var(--text);
}

<div id="bgImage"></div>

#bgImage{
position:fixed;
inset:0;

background:url("https://vote9.campaigns.fire-emblem-heroes.com/assets/img/bg_pc.jpg") center/cover no-repeat;

z-index:-1;
opacity:0.35;
filter:blur(2px);
}
  
header{
padding:1.25rem 1rem;
border-bottom:1px solid #232766;
}

h1{
margin:0;
font-size:1.4rem;
}

main{
max-width:1680px;
margin:0 auto;
padding:1rem;
}

/* Dataset buttons */
#datasetButtons{
display:flex;
gap:.5rem;
margin-bottom:.75rem;
flex-wrap:wrap;
}

#datasetButtons button{
padding:.4rem .7rem;
border-radius:8px;
border:1px solid #2a2f7a;
background:#1b2050;
color:var(--text);
cursor:pointer;
}

#datasetButtons button:hover{
background:#2a2f7a;
}

#datasetButtons button.active {
background:#7c7cff;
color:#fff;
border-color:#7c7cff;
}

.toolbar{
display:flex;
gap:.5rem;
margin-bottom:.75rem;
}

input{
flex:1;
padding:.6rem .7rem;
border-radius:10px;
border:1px solid #2a2f7a;
background:var(--panel);
color:var(--text);
}

table{
width:100%;
border-collapse:collapse;
background:var(--panel);
font-size:14px;
}

thead{
background:#1b2050;
position:sticky;
top:0;
z-index:2;
}

th,td{
border:1px solid #2a2f7a;
padding:6px 8px;
text-align:center;
}

th{
font-weight:700;
color:var(--accent);
cursor:pointer;
}

td:first-child,
th:first-child{
text-align:left;
position:sticky;
left:0;
background:#1b2050;
z-index:1;
}

td:nth-child(2),
th:nth-child(2){
position:sticky;
left:90px;
background:#1b2050;
z-index:1;
}

tbody tr{
transition:background .15s ease;
}

tbody tr:hover{
background:#232766;
}

#dataTable td{
color:black !important;
}

img.mug{
width:50px;
height:50px;
object-fit:cover;
border-radius:6px;
}

img.moveType{
width:28px;
height:28px;
object-fit:contain;
}

footer{
opacity:.7;
text-align:center;
padding:1.5rem 0;
}

a{
color:var(--accent);
text-decoration:none;
}

#loading{
position:fixed;
inset:0;
background:rgba(0,0,0,.65);
display:flex;
align-items:center;
justify-content:center;
font-size:2rem;
color:var(--accent);
z-index:999;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<header>
<h1>Choose Your Legends Data</h1>
</header>

<main>

<div id="datasetButtons"></div>

<div class="toolbar">
<input id="search" placeholder="Search…">
</div>
  
<div id="count"></div>
  
<div style="overflow-x:auto;">
<table id="dataTable">
<thead></thead>
<tbody></tbody>
</table>
</div>

</main>

<footer>
Hosted free on GitHub Pages · Data from Google Sheets
</footer>

<div id="loading">⏳ Loading...</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby2SIa1xkldeimH7OrkltvK9BoPE07PELtGEriB5gPZ8GSzu42ErrvZo3M73S5k8aBycg/exec";

const search = document.getElementById("search");
const loading = document.getElementById("loading");
const tableHead = document.querySelector("#dataTable thead");
const tableBody = document.querySelector("#dataTable tbody");
const buttonContainer = document.getElementById("datasetButtons");

let headers = [];
let data = [];
let hiddenColumns = [];
let sortColumn = null;
let sortAsc = true;
let datasets = {};

// Show/hide loading overlay
function showLoading(){ loading.style.display = "flex"; }
function hideLoading(){ loading.style.display = "none"; }

// Strip "ForWebsite" prefix for display
function getButtonName(rangeName){
  return rangeName.startsWith("ForWebsite") ? rangeName.slice("ForWebsite".length) : rangeName;
}

// Highlight the currently active dataset button
function setActiveButton(name){
  const btnName = getButtonName(name);
  Array.from(buttonContainer.children).forEach(btn=>{
    if(btn.textContent === btnName) btn.classList.add("active");
    else btn.classList.remove("active");
  });
}

// Load a dataset into the table
function loadDataset(name){
  const dataset = datasets[name];
  headers = dataset.headers;
  hiddenColumns = headers
   .map((h,i)=> (!h || h.trim()==="") ? i : -1)
   .filter(i => i !== -1);
  data = dataset.rows.map((row,i)=>({
    row,
    colors: dataset.bgColors ? dataset.bgColors[i] : [],
    originalIndex: i
  }));
  sortColumn=null;
  render(search.value);
  setActiveButton(name);
}

// Sorting
function sortData(){
  if(sortColumn === null) return;
  data.sort((a,b)=>{
    let valA=a.row[sortColumn], valB=b.row[sortColumn];
    const cleanA=valA?valA.toString().replace(/,/g,""):"";
    const cleanB=valB?valB.toString().replace(/,/g,""):"";
    const numA=parseFloat(cleanA), numB=parseFloat(cleanB);
    if(!isNaN(numA) && !isNaN(numB)) return sortAsc?numA-numB:numB-numA;
    valA = valA?valA.toString().toLowerCase():"";
    valB = valB?valB.toString().toLowerCase():"";
    if(valA<valB) return sortAsc?-1:1;
    if(valA>valB) return sortAsc?1:-1;
    return 0;
  });
}

// Render table
function render(filter=""){
  const f = filter.toLowerCase();
  tableHead.innerHTML="";
  tableBody.innerHTML="";
  if(!headers.length) return;

  const mugIndex = headers.indexOf("Mug");
  const moveTypeIndex = headers.indexOf("Move Type");

  const headerRow = document.createElement("tr");
  
  headers.forEach((h,i)=>{
    if(hiddenColumns.includes(i)) return;
    const th = document.createElement("th");
    let arrow = "";
    if(i!==mugIndex){
      if(sortColumn===i){
          arrow = sortAsc ? " ▲" : " ▼";
      }else{
        arrow = "▲▼";
      }
     th.onclick = () => {

  if(sortColumn !== i){
    // First click → descending
    sortColumn = i;
    sortAsc = false;

  } else if(!sortAsc){
    // Second click → ascending
    sortAsc = true;

  } else {
    // Third click → reset sort
    sortColumn = null;

    data.sort((a,b)=>a.originalIndex - b.originalIndex);
    render(search.value);
    return;
  }

  sortData();
  render(search.value);
};
    }
    th.innerHTML = `<div class="thLabel">${h}</div><div class="thArrow">${arrow}</div>`;
    headerRow.appendChild(th);
  });
  tableHead.appendChild(headerRow);

  let html="";
  
const rowsToRender = data.filter(obj=>{
  if(sortColumn !== null){
    const val = obj.row[sortColumn];
    if(val === "" || val === null || val === undefined) return false;
  }

  if(!filter) return true;

  return obj.row.some(cell =>
    cell && cell.toString().toLowerCase().includes(f)
  );
});

document.getElementById("count").textContent =
rowsToRender.length + " rows";

  rowsToRender.forEach(obj=>{
    const r=obj.row, colors=obj.colors;
    html+="<tr>";
    r.forEach((cell,i)=>{
      if(hiddenColumns.includes(i)) return;
      let style = (colors && colors[i])?` style="background:${colors[i]}"`:"";
      html+=`<td${style}>`;
      if(i===mugIndex && cell) html+=`<img class="mug" src="${cell}">`;
      else if(i===moveTypeIndex && cell) html+=`<img class="moveType" src="${cell}">`;
      else html+=(!isNaN(cell)&&cell!=="")?Number(cell).toLocaleString(undefined,{maximumFractionDigits:2}):(cell??"");
      html+="</td>";
    });
    html+="</tr>";
  });

  tableBody.innerHTML = html;
}

// Load data from API
showLoading();
fetch(API_URL + "?endpoint=forwebsite")
.then(r => r.json())
.then(dataAPI => {

  datasets = dataAPI.ranges;

  // Create buttons
  Object.keys(datasets).forEach(name=>{
    const btn = document.createElement("button");
    btn.textContent = getButtonName(name);
    btn.onclick = ()=>loadDataset(name);
    buttonContainer.appendChild(btn);
  });

  // Set default dataset
  const defaultDataset = "ForWebsiteVotes"; // <-- change to your preferred default
  if(datasets[defaultDataset]) loadDataset(defaultDataset);
  else {
    const first = Object.keys(datasets)[0];
    if(first) loadDataset(first);
  }

  hideLoading();

})
.catch(err=>{
  console.error("FETCH FAILED:",err);
  hideLoading();
});

search.addEventListener("input", e => render(e.target.value));
</script>

</body>
</html>
