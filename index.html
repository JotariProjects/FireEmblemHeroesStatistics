<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Sheets-Backed Site</title>

<style>
:root{
--bg:#0f1220;
--panel:#161a2f;
--text:#e7e9ff;
--muted:#aab0ff;
--accent:#7c7cff;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;

background:
linear-gradient(rgba(11,14,26,0.85), rgba(15,18,32,0.9)),
url("https://cdn.fireemblemwiki.org/3/38/FESK_Bloom_01.png");

background-size:cover;
background-position:center 70%;
background-attachment:fixed;

color:var(--text);
}

header{
padding:1.25rem 1rem;
border-bottom:1px solid #232766;
}

h1{
margin:0;
font-size:1.4rem;
}

main{
max-width:1680px;
margin:0 auto;
padding:1rem;
}

/* metric buttons */

#datasetButtons{
display:flex;
gap:.5rem;
margin-bottom:.75rem;
flex-wrap:wrap;
}

#datasetButtons button{
padding:.4rem .7rem;
border-radius:8px;
border:1px solid #2a2f7a;
background:#1b2050;
color:var(--text);
cursor:pointer;
}

#datasetButtons button:hover{
background:#2a2f7a;
}

#datasetButtons button.active{
background:#7c7cff;
color:#fff;
border-color:#7c7cff;
}

/* toolbar */

.toolbar{
display:flex;
gap:.5rem;
margin-bottom:.75rem;
flex-wrap:wrap;
}

select,input{
padding:.6rem .7rem;
border-radius:10px;
border:1px solid #2a2f7a;
background:var(--panel);
color:var(--text);
}

input{
flex:1;
}

/* table */

table{
width:100%;
border-collapse:collapse;
background:var(--panel);
font-size:14px;
}

thead{
background:#1b2050;
position:sticky;
top:0;
z-index:2;
}

th,td{
border:1px solid #2a2f7a;
padding:6px 8px;
text-align:center;
}

th{
font-weight:700;
color:var(--accent);
cursor:pointer;
}

/* sticky columns */

td:first-child,
th:first-child{
text-align:left;
position:sticky;
left:0;
background:#1b2050;
z-index:1;
width:90px;
}

td:nth-child(2),
th:nth-child(2){
position:sticky;
left:90px;
background:#1b2050;
z-index:1;
}

tbody tr{
transition:background .15s ease;
}

tbody tr:hover{
background:#232766;
}

/* black cell text */

#dataTable td{
color:black !important;
}

img.mug{
width:50px;
height:50px;
object-fit:cover;
border-radius:6px;
}

img.moveType{
width:28px;
height:28px;
object-fit:contain;
}

footer{
opacity:.7;
text-align:center;
padding:1.5rem 0;
}

#loading{
position:fixed;
inset:0;
background:rgba(0,0,0,.65);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}
</style>
</head>

<body>

<header>
<h1>Choose Your Legends Data</h1>
</header>

<main>

<div id="datasetButtons"></div>

<div class="toolbar">

<select id="categorySelect">
<option value="Combined">Combined</option>
<option value="No_Shadow_Cup">No Shadow Cup</option>
<option value="Shadow_Cup">Only Shadow Cup</option>
</select>

<input id="search" placeholder="Search…">

</div>

<div id="count"></div>

<div style="overflow-x:auto;">
<table id="dataTable">
<thead></thead>
<tbody></tbody>
</table>
</div>

</main>

<footer>
Vote for Amy in the Shadow Cup
</footer>

<div id="loading">
<img src="https://i.imgur.com/1cXgq23.png">
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycby2SIa1xkldeimH7OrkltvK9BoPE07PELtGEriB5gPZ8GSzu42ErrvZo3M73S5k8aBycg/exec";

const search=document.getElementById("search");
const loading=document.getElementById("loading");
const tableHead=document.querySelector("#dataTable thead");
const tableBody=document.querySelector("#dataTable tbody");
const buttonContainer=document.getElementById("datasetButtons");
const categorySelect=document.getElementById("categorySelect");

let headers=[];
let data=[];
let hiddenColumns=[];
let sortColumn=null;
let sortAsc=true;
let datasets={};

let selectedMetric="Votes";
let selectedCategory="No_Shadow_Cup";

function showLoading(){loading.style.display="flex";}
function hideLoading(){loading.style.display="none";}

function loadCurrentDataset(){

const datasetName =
"ForWebsite" +
selectedCategory +
"_" +
selectedMetric;

console.log("Trying to load dataset:", datasetName);

console.log("Available datasets:", Object.keys(datasets));

if(datasets[datasetName]){

console.log("Dataset FOUND:", datasetName);

loadDataset(datasetName);

}
else{

console.error("Dataset NOT FOUND:", datasetName);

}

}

function setActiveButton(metric){

Array.from(buttonContainer.children).forEach(btn=>{

if(btn.textContent===metric)
btn.classList.add("active");
else
btn.classList.remove("active");

});

}

function loadDataset(name){

const dataset=datasets[name];

headers=dataset.headers;

hiddenColumns=headers
.map((h,i)=>(!h||h.trim()==="")?i:-1)
.filter(i=>i!==-1);

data=dataset.rows.map((row,i)=>({
row,
colors:dataset.bgColors?dataset.bgColors[i]:[],
originalIndex:i
}));

sortColumn=null;

render(search.value);

}

function sortData(){

if(sortColumn===null)return;

data.sort((a,b)=>{

let valA=a.row[sortColumn];
let valB=b.row[sortColumn];

const cleanA=valA?valA.toString().replace(/,/g,""):"";
const cleanB=valB?valB.toString().replace(/,/g,""):"";

const numA=parseFloat(cleanA);
const numB=parseFloat(cleanB);

if(!isNaN(numA)&&!isNaN(numB))
return sortAsc?numA-numB:numB-numA;

valA=valA?valA.toString().toLowerCase():"";
valB=valB?valB.toString().toLowerCase():"";

if(valA<valB)return sortAsc?-1:1;
if(valA>valB)return sortAsc?1:-1;

return 0;

});

}

function render(filter=""){

const f=filter.toLowerCase();

tableHead.innerHTML="";
tableBody.innerHTML="";

if(!headers.length)return;

const mugIndex=headers.indexOf("Mug");
const moveTypeIndex=headers.indexOf("Move Type");

const headerRow=document.createElement("tr");

headers.forEach((h,i)=>{

if(hiddenColumns.includes(i))return;

const th=document.createElement("th");

let arrow="";

if(i!==mugIndex){

if(sortColumn===i)arrow=sortAsc?" ▲":" ▼";
else arrow="▲▼";

th.onclick=()=>{

if(sortColumn!==i){
sortColumn=i;
sortAsc=false;
}

else if(!sortAsc){
sortAsc=true;
}

else{

sortColumn=null;

data.sort((a,b)=>a.originalIndex-b.originalIndex);

render(search.value);

return;
}

sortData();
render(search.value);

};

}

th.innerHTML=`${h} ${arrow}`;

headerRow.appendChild(th);

});

tableHead.appendChild(headerRow);

let html="";

const rowsToRender=data.filter(obj=>{

if(sortColumn!==null){

const val=obj.row[sortColumn];

if(val===""||val===null||val===undefined)return false;

}

if(!filter)return true;

return obj.row.some(cell=>
cell&&cell.toString().toLowerCase().includes(f)
);

});

document.getElementById("count").textContent=rowsToRender.length+" rows";

rowsToRender.forEach(obj=>{

const r=obj.row;
const colors=obj.colors;

html+="<tr>";

r.forEach((cell,i)=>{

if(hiddenColumns.includes(i))return;

let style=(colors&&colors[i])?` style="background:${colors[i]}"`:"";

html+=`<td${style}>`;

if(i===mugIndex&&cell)
html+=`<img class="mug" src="${encodeURI(cell)}">`;

else if(i===moveTypeIndex&&cell)
html+=`<img class="moveType" src="${encodeURI(cell)}">`;

else
html+=(!isNaN(cell)&&cell!=="")
?Number(cell).toLocaleString(undefined,{maximumFractionDigits:2})
:(cell??"");

html+="</td>";

});

html+="</tr>";

});

tableBody.innerHTML=html;

}

showLoading();

fetch(API_URL+"?endpoint=forwebsite")
.then(r=>r.json())
.then(dataAPI=>{

datasets=dataAPI.ranges;

const metrics=["Rank","Percentage","Votes"];

metrics.forEach(metric=>{

const btn=document.createElement("button");

btn.textContent=metric;

btn.onclick=()=>{

selectedMetric=metric;

setActiveButton(metric);

loadCurrentDataset();

};

buttonContainer.appendChild(btn);

});

setActiveButton(selectedMetric);

categorySelect.addEventListener("change",e=>{

selectedCategory=e.target.value;

loadCurrentDataset();

});

loadCurrentDataset();

hideLoading();

})
.catch(err=>{
console.error("FETCH FAILED:",err);
hideLoading();
});

let searchTimer;

search.addEventListener("input",e=>{
clearTimeout(searchTimer);
searchTimer=setTimeout(()=>render(e.target.value),150);
});

</script>

</body>
</html>
