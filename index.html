<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Sheets-Backed Site</title>

<style>
:root{
--bg:#0f1220;
--panel:#161a2f;
--text:#e7e9ff;
--muted:#aab0ff;
--accent:#7c7cff;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;
background:linear-gradient(180deg,#0b0e1a,var(--bg));
color:var(--text);
}

header{
padding:1.25rem 1rem;
border-bottom:1px solid #232766;
}

h1{
margin:0;
font-size:1.4rem;
}

main{
max-width:1680px;
margin:0 auto;
padding:1rem;
}

.toolbar{
display:flex;
gap:.5rem;
margin-bottom:.75rem;
}

input{
flex:1;
padding:.6rem .7rem;
border-radius:10px;
border:1px solid #2a2f7a;
background:var(--panel);
color:var(--text);
}

table{
width:100%;
border-collapse:collapse;
background:var(--panel);
font-size:14px;
}

thead{
background:#1b2050;
position:sticky;
top:0;
z-index:2;
}

th,td{
border:1px solid #2a2f7a;
padding:6px 8px;
text-align:center;
}

th{
font-weight:700;
color:var(--accent);
cursor:pointer;
}

td:first-child,
th:first-child{
text-align:left;
position:sticky;
left:0;
background:#1b2050;
z-index:1;
}

tbody tr{
transition:background .15s ease;
}

tbody tr:hover{
background:#232766;
}

#dataTable td{
color:black !important;
}

img.mug{
width:50px;
height:50px;
object-fit:cover;
border-radius:6px;
}

img.moveType{
width:28px;
height:28px;
object-fit:contain;
}

footer{
opacity:.7;
text-align:center;
padding:1.5rem 0;
}

a{
color:var(--accent);
text-decoration:none;
}

/* LOADING OVERLAY */

#loading{
position:fixed;
inset:0;
background:rgba(0,0,0,.65);
display:flex;
align-items:center;
justify-content:center;
font-size:2rem;
color:var(--accent);
z-index:999;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<header>
<h1>Choose Your Legends Data</h1>
</header>

<main>

<div class="toolbar">
<input id="search" placeholder="Search…">
</div>

<div style="overflow-x:auto;">
<table id="dataTable">
<thead></thead>
<tbody></tbody>
</table>
</div>

</main>

<footer>
Hosted free on GitHub Pages · Data from Google Sheets
</footer>

<div id="loading">⏳ Loading...</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycby2SIa1xkldeimH7OrkltvK9BoPE07PELtGEriB5gPZ8GSzu42ErrvZo3M73S5k8aBycg/exec";

const search=document.getElementById("search");
const loading=document.getElementById("loading");

const tableHead=document.querySelector("#dataTable thead");
const tableBody=document.querySelector("#dataTable tbody");

let headers=[];
let data=[];

let sortColumn=null;
let sortAsc=true;

function showLoading(){
loading.style.display = "flex";
}

function hideLoading(){
loading.style.display = "none";
}


function sortData(){

if(sortColumn===null)return;

data.sort((a,b)=>{

let valA=a.row[sortColumn];
let valB=b.row[sortColumn];

const cleanA=valA?valA.toString().replace(/,/g,""):"";
const cleanB=valB?valB.toString().replace(/,/g,""):"";

const numA=parseFloat(cleanA);
const numB=parseFloat(cleanB);

if(!isNaN(numA)&&!isNaN(numB))
return sortAsc?numA-numB:numB-numA;

valA=valA?valA.toString().toLowerCase():"";
valB=valB?valB.toString().toLowerCase():"";

if(valA<valB)return sortAsc?-1:1;
if(valA>valB)return sortAsc?1:-1;

return 0;

});

}

function render(filter=""){

const f=filter.toLowerCase();

tableHead.innerHTML="";
tableBody.innerHTML="";

if(!headers.length)return;

const mugIndex=headers.indexOf("Mug");
const moveTypeIndex=headers.indexOf("Move Type");

const headerRow=document.createElement("tr");

headers.forEach((h,i)=>{

const th=document.createElement("th");

let arrow="";
if(sortColumn===i)arrow=sortAsc?" ▲":" ▼";

th.textContent=h+arrow;

if(i!==mugIndex){

th.onclick=()=>{
if(sortColumn===i)sortAsc=!sortAsc;
else{
sortColumn=i;
sortAsc=false;
}

sortData();
render(search.value);

};

}

headerRow.appendChild(th);

});

tableHead.appendChild(headerRow);

let html="";

const rowsToRender=data.filter(obj=>{
if(!filter)return true;
return obj.row.some(cell=>
cell&&cell.toString().toLowerCase().includes(f)
);
});

rowsToRender.forEach(obj=>{

const r=obj.row;
const colors=obj.colors;

html+="<tr>";

r.forEach((cell,i)=>{

let style="";
if(colors&&colors[i])style=` style="background:${colors[i]}"`;

html+=`<td${style}>`;

if(i===mugIndex&&cell){

html+=`<img class="mug" src="${cell}">`;

}
else if(i===moveTypeIndex&&cell){

html+=`<img class="moveType" src="${cell}">`;

}
else{

if(!isNaN(cell)&&cell!=="")
html+=Number(cell).toLocaleString(undefined,{maximumFractionDigits:2});
else
html+=cell??"";

}

html+="</td>";

});

html+="</tr>";

});

tableBody.innerHTML=html;

}

showLoading();

fetch(API_URL+"?endpoint=forwebsite")
.then(r=>r.json())
.then(dataAPI=>{

headers=dataAPI.headers;

data=dataAPI.rows.map((row,i)=>({
row:row,
colors:dataAPI.bgColors?dataAPI.bgColors[i]:[]
}));

render();

hideLoading();

})
.catch(err=>{
console.error("FETCH FAILED:",err);
hideLoading();
});

search.addEventListener("input",e=>{
render(e.target.value);
});

</script>

</body>
</html>
